version: "3.9"

services:
  backend:
    build: ./backend
    container_name: estoque_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: estoque_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: always