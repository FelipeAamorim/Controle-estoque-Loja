<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Estoque — Loja de Roupas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1.5rem}
  h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;color:#1a1a18}
  .tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
  .tab{padding:8px 18px;border:1px solid #d0cfc6;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#5f5e5a;transition:all .15s}
  .tab.active{background:#f0efe8;color:#1a1a18;font-weight:500;border-color:#888780}
  .tab:hover{background:#f0efe8}
  .section{display:none}.section.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
  .card{background:#eeeee8;border-radius:8px;padding:1rem}
  .card .label{font-size:12px;color:#888780;margin-bottom:4px}
  .card .value{font-size:22px;font-weight:500;color:#1a1a18}
  .raised{background:#fff;border:1px solid #e0dfd6;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-row.tri{grid-template-columns:1fr 1fr 1fr}
  label{display:block;font-size:12px;color:#888780;margin-bottom:4px}
  input,select{width:100%;padding:8px 10px;border:1px solid #d0cfc6;border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;outline:none}
  input:focus,select:focus{border-color:#888780}
  .btn{padding:9px 18px;border:1px solid #d0cfc6;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a18;transition:all .15s}
  .btn-primary{background:#1a1a18;color:#fff;border-color:transparent}
  .btn:hover{background:#f0efe8}
  .btn-primary:hover{background:#333330}
  .btn-danger{color:#a32d2d;border-color:#f09595}
  .btn-danger:hover{background:#fcebeb}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;font-size:12px;font-weight:500;color:#888780;border-bottom:1px solid #e0dfd6}
  td{padding:9px 10px;border-bottom:1px solid #f0efe8;color:#1a1a18}
  tr:last-child td{border-bottom:none}
  .badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
  .badge-ok{background:#eaf3de;color:#3b6d11}
  .badge-low{background:#faeeda;color:#854f0b}
  .badge-out{background:#fcebeb;color:#a32d2d}
  .badge-in{background:#e6f1fb;color:#185fa5}
  .row-actions{display:flex;gap:6px}
  .search{width:100%;margin-bottom:1rem;padding:8px 12px;border:1px solid #d0cfc6;border-radius:8px;font-size:14px}
  .empty{text-align:center;padding:2rem;color:#b4b2a9;font-size:14px}
  .flash{display:none;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:13px}
  .section-title{font-size:15px;font-weight:500;margin-bottom:1rem;color:#1a1a18}
  @media(max-width:600px){.form-row,.form-row.tri{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>Loja de Roupas — Controle de Estoque</h1>
<div id="flash" class="flash"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">Painel</button>
  <button class="tab" onclick="showTab('estoque')">Estoque</button>
  <button class="tab" onclick="showTab('entrada')">Entrada</button>
  <button class="tab" onclick="showTab('saida')">Saída</button>
  <button class="tab" onclick="showTab('historico')">Histórico</button>
</div>

<!-- PAINEL -->
<div id="sec-dashboard" class="section active">
  <div class="cards" id="cards-dashboard"></div>
  <div class="raised">
    <p class="section-title">Estoque baixo / esgotado</p>
    <div id="low-stock"></div>
  </div>
  <div class="raised">
    <p class="section-title">Últimas movimentações</p>
    <div id="recent-moves"></div>
  </div>
</div>

<!-- ESTOQUE -->
<div id="sec-estoque" class="section">
  <div class="raised">
    <p class="section-title">Cadastrar produto</p>
    <div class="form-row tri">
      <div><label>Nome</label><input id="p-nome" placeholder="Ex: Camiseta Branca"></div>
      <div><label>Categoria</label>
        <select id="p-cat">
          <option>Camiseta</option><option>Calça</option><option>Vestido</option>
          <option>Short</option><option>Jaqueta</option><option>Acessório</option><option>Outro</option>
        </select>
      </div>
      <div><label>Tamanho</label>
        <select id="p-tam"><option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>Único</option></select>
      </div>
    </div>
    <div class="form-row tri">
      <div><label>Quantidade inicial</label><input id="p-qty" type="number" min="0" value="0"></div>
      <div><label>Preço de custo (R$)</label><input id="p-custo" type="number" min="0" step="0.01" placeholder="0,00"></div>
      <div><label>Preço de venda (R$)</label><input id="p-venda" type="number" min="0" step="0.01" placeholder="0,00"></div>
    </div>
    <button class="btn btn-primary" onclick="addProduto()">Adicionar produto</button>
  </div>
  <div class="raised">
    <input class="search" id="search-estoque" placeholder="Buscar produto..." oninput="renderEstoque()">
    <div id="tabela-estoque"></div>
  </div>
</div>

<!-- ENTRADA -->
<div id="sec-entrada" class="section">
  <div class="raised">
    <p class="section-title">Registrar entrada de mercadoria</p>
    <div class="form-row">
      <div><label>Produto</label><select id="e-prod"></select></div>
      <div><label>Quantidade</label><input id="e-qty" type="number" min="1" value="1"></div>
    </div>
    <div class="form-row">
      <div><label>Fornecedor (opcional)</label><input id="e-forn" placeholder="Ex: Fornecedor ABC"></div>
      <div><label>Observação</label><input id="e-obs" placeholder="Ex: Coleção verão"></div>
    </div>
    <button class="btn btn-primary" onclick="addEntrada()">Registrar entrada</button>
  </div>
</div>

<!-- SAÍDA -->
<div id="sec-saida" class="section">
  <div class="raised">
    <p class="section-title">Registrar saída (venda / baixa)</p>
    <div class="form-row">
      <div><label>Produto</label><select id="s-prod"></select></div>
      <div><label>Quantidade</label><input id="s-qty" type="number" min="1" value="1"></div>
    </div>
    <div class="form-row">
      <div><label>Tipo</label>
        <select id="s-tipo"><option>Venda</option><option>Troca</option><option>Descarte</option><option>Devolução</option></select>
      </div>
      <div><label>Observação</label><input id="s-obs" placeholder="Opcional"></div>
    </div>
    <button class="btn btn-primary" onclick="addSaida()">Registrar saída</button>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="sec-historico" class="section">
  <div class="raised">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <select id="filtro-tipo" onchange="renderHistorico()" style="width:auto;padding:8px 12px;border:1px solid #d0cfc6;border-radius:8px;font-size:13px;background:#fff">
        <option value="">Todos</option><option value="Entrada">Entradas</option><option value="Saída">Saídas</option>
      </select>
      <input id="filtro-busca" placeholder="Buscar produto..." oninput="renderHistorico()" style="flex:1;min-width:140px;padding:8px 12px;border:1px solid #d0cfc6;border-radius:8px;font-size:13px">
    </div>
    <div id="tabela-historico"></div>
  </div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('loja_produtos')||'[]');
let movimentos = JSON.parse(localStorage.getItem('loja_movimentos')||'[]');

function save(){
  localStorage.setItem('loja_produtos',JSON.stringify(produtos));
  localStorage.setItem('loja_movimentos',JSON.stringify(movimentos));
}

function flash(msg, type='ok'){
  const el = document.getElementById('flash');
  el.style.display = 'block';
  el.style.background = type==='ok' ? '#eaf3de' : '#fcebeb';
  el.style.color = type==='ok' ? '#3b6d11' : '#a32d2d';
  el.style.border = type==='ok' ? '1px solid #c0dd97' : '1px solid #f09595';
  el.textContent = msg;
  setTimeout(()=>el.style.display='none', 2800);
}

function showTab(t){
  const tabs = ['dashboard','estoque','entrada','saida','historico'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', tabs[i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='dashboard') renderDashboard();
  if(t==='estoque') renderEstoque();
  if(t==='entrada') renderSelectProd('e-prod');
  if(t==='saida') renderSelectProd('s-prod');
  if(t==='historico') renderHistorico();
}

function renderSelectProd(id){
  const s = document.getElementById(id);
  s.innerHTML = produtos.length
    ? produtos.map((p,i)=>`<option value="${i}">${p.nome} — ${p.tamanho} (estoque: ${p.qty})</option>`).join('')
    : '<option>Nenhum produto cadastrado</option>';
}

function stockBadge(qty){
  if(qty<=0) return '<span class="badge badge-out">Esgotado</span>';
  if(qty<=5) return '<span class="badge badge-low">Baixo</span>';
  return '<span class="badge badge-ok">OK</span>';
}

function renderDashboard(){
  const total = produtos.length;
  const totalQty = produtos.reduce((a,p)=>a+p.qty,0);
  const totalValorCusto = produtos.reduce((a,p)=>a+p.qty*p.custo,0);
  const totalValorVenda = produtos.reduce((a,p)=>a+p.qty*p.venda,0);
  document.getElementById('cards-dashboard').innerHTML=`
    <div class="card"><div class="label">Produtos cadastrados</div><div class="value">${total}</div></div>
    <div class="card"><div class="label">Peças em estoque</div><div class="value">${totalQty}</div></div>
    <div class="card"><div class="label">Valor de custo</div><div class="value">R$ ${totalValorCusto.toFixed(2)}</div></div>
    <div class="card"><div class="label">Valor de venda</div><div class="value">R$ ${totalValorVenda.toFixed(2)}</div></div>
  `;
  const low = produtos.filter(p=>p.qty<=5);
  document.getElementById('low-stock').innerHTML = low.length
    ? `<table><thead><tr><th>Produto</th><th>Tamanho</th><th>Qtd</th><th>Status</th></tr></thead><tbody>${low.map(p=>`<tr><td>${p.nome}</td><td>${p.tamanho}</td><td>${p.qty}</td><td>${stockBadge(p.qty)}</td></tr>`).join('')}</tbody></table>`
    : '<p class="empty">Tudo com estoque suficiente!</p>';
  const rec = movimentos.slice(-6).reverse();
  document.getElementById('recent-moves').innerHTML = rec.length
    ? `<table><thead><tr><th>Data</th><th>Tipo</th><th>Produto</th><th>Qtd</th></tr></thead><tbody>${rec.map(m=>`<tr><td>${m.data}</td><td><span class="badge ${m.tipo==='Entrada'?'badge-in':'badge-low'}">${m.tipo}</span></td><td>${m.produto}</td><td>${m.qty}</td></tr>`).join('')}</tbody></table>`
    : '<p class="empty">Nenhuma movimentação ainda.</p>';
}

function renderEstoque(){
  const q = (document.getElementById('search-estoque').value||'').toLowerCase();
  const list = produtos.filter(p=>p.nome.toLowerCase().includes(q)||p.categoria.toLowerCase().includes(q));
  document.getElementById('tabela-estoque').innerHTML = list.length
    ? `<table><thead><tr><th>Nome</th><th>Categoria</th><th>Tam.</th><th>Qtd</th><th>Custo</th><th>Venda</th><th>Status</th><th></th></tr></thead><tbody>${list.map((p)=>{const ri=produtos.indexOf(p);return`<tr><td>${p.nome}</td><td>${p.categoria}</td><td>${p.tamanho}</td><td>${p.qty}</td><td>R$ ${p.custo.toFixed(2)}</td><td>R$ ${p.venda.toFixed(2)}</td><td>${stockBadge(p.qty)}</td><td><div class="row-actions"><button class="btn btn-danger" onclick="deleteProduto(${ri})">Remover</button></div></td></tr>`}).join('')}</tbody></table>`
    : '<p class="empty">Nenhum produto encontrado.</p>';
}

function addProduto(){
  const nome = document.getElementById('p-nome').value.trim();
  if(!nome){ flash('Informe o nome do produto.','err'); return; }
  produtos.push({
    nome,
    categoria: document.getElementById('p-cat').value,
    tamanho: document.getElementById('p-tam').value,
    qty: parseInt(document.getElementById('p-qty').value)||0,
    custo: parseFloat(document.getElementById('p-custo').value)||0,
    venda: parseFloat(document.getElementById('p-venda').value)||0
  });
  save();
  document.getElementById('p-nome').value='';
  document.getElementById('p-qty').value=0;
  document.getElementById('p-custo').value='';
  document.getElementById('p-venda').value='';
  flash('Produto cadastrado com sucesso!');
  renderEstoque();
}

function deleteProduto(i){
  if(!confirm('Deseja remover este produto do estoque?')) return;
  produtos.splice(i,1);
  save();
  renderEstoque();
  flash('Produto removido.');
}

function now(){
  return new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function addEntrada(){
  if(!produtos.length){ flash('Cadastre produtos primeiro.','err'); return; }
  const i = parseInt(document.getElementById('e-prod').value);
  const qty = parseInt(document.getElementById('e-qty').value)||0;
  if(qty<=0){ flash('Quantidade inválida.','err'); return; }
  produtos[i].qty += qty;
  movimentos.push({
    data: now(), tipo:'Entrada', produto: produtos[i].nome, qty,
    obs: document.getElementById('e-obs').value,
    forn: document.getElementById('e-forn').value
  });
  save();
  flash(`Entrada de ${qty} peça(s) de "${produtos[i].nome}" registrada!`);
  document.getElementById('e-qty').value=1;
  document.getElementById('e-obs').value='';
  document.getElementById('e-forn').value='';
  renderSelectProd('e-prod');
}

function addSaida(){
  if(!produtos.length){ flash('Cadastre produtos primeiro.','err'); return; }
  const i = parseInt(document.getElementById('s-prod').value);
  const qty = parseInt(document.getElementById('s-qty').value)||0;
  if(qty<=0){ flash('Quantidade inválida.','err'); return; }
  if(produtos[i].qty < qty){ flash('Estoque insuficiente para essa saída!','err'); return; }
  produtos[i].qty -= qty;
  const tipo = document.getElementById('s-tipo').value;
  movimentos.push({
    data: now(), tipo:'Saída', subtipo: tipo, produto: produtos[i].nome, qty,
    obs: document.getElementById('s-obs').value
  });
  save();
  flash(`Saída de ${qty} peça(s) de "${produtos[i].nome}" registrada!`);
  document.getElementById('s-qty').value=1;
  document.getElementById('s-obs').value='';
  renderSelectProd('s-prod');
}

function renderHistorico(){
  const tf = document.getElementById('filtro-tipo').value;
  const tb = (document.getElementById('filtro-busca').value||'').toLowerCase();
  const list = movimentos.filter(m=>(tf===''||m.tipo===tf)&&(tb===''||m.produto.toLowerCase().includes(tb))).slice().reverse();
  document.getElementById('tabela-historico').innerHTML = list.length
    ? `<table><thead><tr><th>Data</th><th>Tipo</th><th>Produto</th><th>Qtd</th><th>Obs.</th></tr></thead><tbody>${list.map(m=>`<tr><td>${m.data}</td><td><span class="badge ${m.tipo==='Entrada'?'badge-in':'badge-low'}">${m.tipo}${m.subtipo?' / '+m.subtipo:''}</span></td><td>${m.produto}</td><td>${m.qty}</td><td style="color:#888780">${m.obs||m.forn||'—'}</td></tr>`).join('')}</tbody></table>`
    : '<p class="empty">Nenhuma movimentação encontrada.</p>';
}

renderDashboard();
</script>
</body>
</html>
