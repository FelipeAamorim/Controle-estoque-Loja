<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Estoque — Loja de Roupas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:1.5rem}
  h1{font-size:20px;font-weight:600;margin-bottom:1.5rem;color:#1a1a18}
  .tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
  .tab{padding:9px 18px;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#555}
  .tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
  .tab:hover:not(.active){background:#eee}
  .section{display:none}.section.active{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.5rem}
  .card{background:#fff;border-radius:10px;padding:1rem;border:1px solid #e0e0de}
  .card .label{font-size:12px;color:#888;margin-bottom:4px}
  .card .value{font-size:22px;font-weight:600;color:#1a1a18}
  .raised{background:#fff;border:1px solid #e0e0de;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-row.tri{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:600px){.form-row,.form-row.tri{grid-template-columns:1fr}}
  label{display:block;font-size:12px;color:#666;margin-bottom:4px}
  input,select{width:100%;padding:9px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#1a1a18;outline:none}
  input:focus,select:focus{border-color:#888}
  .btn{padding:9px 18px;border:1px solid #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a18}
  .btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
  .btn:hover{background:#eee}
  .btn-primary:hover{background:#333}
  .btn-danger{color:#c0392b;border-color:#e0b0ae}
  .btn-danger:hover{background:#fdf0ef}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;font-size:12px;font-weight:600;color:#888;border-bottom:1px solid #eee}
  td{padding:9px 10px;border-bottom:1px solid #f0f0ee;color:#1a1a18}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:600}
  .badge-ok{background:#e6f4ea;color:#2e7d32}
  .badge-low{background:#fff8e1;color:#f57f17}
  .badge-out{background:#fdecea;color:#c62828}
  .badge-in{background:#e3f2fd;color:#1565c0}
  .search{width:100%;margin-bottom:1rem;padding:9px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;outline:none}
  .search:focus{border-color:#888}
  .empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
  .flash{display:none;padding:10px 16px;border-radius:8px;margin-bottom:1rem;font-size:13px;font-weight:500}
  .flash-ok{background:#e6f4ea;color:#2e7d32}
  .flash-err{background:#fdecea;color:#c62828}
  .section-title{font-size:15px;font-weight:600;margin-bottom:1rem;color:#1a1a18}
  .row-actions{display:flex;gap:6px}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
  .header-right{font-size:12px;color:#aaa}
</style>
</head>
<body>

<div class="header">
  <h1>👗 Sistema da Loja</h1>
  <span class="header-right" id="data-hora"></span>
</div>

<div id="flash" class="flash"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('dashboard')">📊 Painel</button>
  <button class="tab" onclick="showTab('estoque')">📦 Estoque</button>
  <button class="tab" onclick="showTab('entrada')">⬇️ Entrada</button>
  <button class="tab" onclick="showTab('saida')">⬆️ Saída</button>
  <button class="tab" onclick="showTab('historico')">📋 Histórico</button>
</div>

<!-- PAINEL -->
<div id="sec-dashboard" class="section active">
  <div class="cards" id="cards-dashboard"></div>
  <div class="raised">
    <p class="section-title">⚠️ Estoque baixo ou esgotado</p>
    <div id="low-stock"></div>
  </div>
  <div class="raised">
    <p class="section-title">🕐 Últimas movimentações</p>
    <div id="recent-moves"></div>
  </div>
</div>

<!-- ESTOQUE -->
<div id="sec-estoque" class="section">
  <div class="raised">
    <p class="section-title">Cadastrar novo produto</p>
    <div class="form-row tri">
      <div><label>Nome do produto</label><input id="p-nome" placeholder="Ex: Camiseta Branca"></div>
      <div><label>Categoria</label>
        <select id="p-cat">
          <option>Camiseta</option><option>Calça</option><option>Vestido</option>
          <option>Short</option><option>Saia</option><option>Jaqueta</option>
          <option>Blusa</option><option>Acessório</option><option>Outro</option>
        </select>
      </div>
      <div><label>Tamanho</label>
        <select id="p-tam"><option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option><option>XGG</option><option>Único</option></select>
      </div>
    </div>
    <div class="form-row tri">
      <div><label>Quantidade inicial</label><input id="p-qty" type="number" min="0" value="0"></div>
      <div><label>Preço de custo (R$)</label><input id="p-custo" type="number" min="0" step="0.01" placeholder="0,00"></div>
      <div><label>Preço de venda (R$)</label><input id="p-venda" type="number" min="0" step="0.01" placeholder="0,00"></div>
    </div>
    <div><label>Cor / Descrição (opcional)</label><input id="p-desc" placeholder="Ex: Azul marinho, listrado..."></div>
    <br>
    <button class="btn btn-primary" onclick="addProduto()">+ Adicionar produto</button>
  </div>
  <div class="raised">
    <input class="search" id="search-estoque" placeholder="🔍 Buscar por nome ou categoria..." oninput="renderEstoque()">
    <div id="tabela-estoque"></div>
  </div>
</div>

<!-- ENTRADA -->
<div id="sec-entrada" class="section">
  <div class="raised">
    <p class="section-title">Registrar entrada de mercadoria</p>
    <div class="form-row">
      <div><label>Produto</label><select id="e-prod" style="width:100%"></select></div>
      <div><label>Quantidade recebida</label><input id="e-qty" type="number" min="1" value="1"></div>
    </div>
    <div class="form-row">
      <div><label>Fornecedor (opcional)</label><input id="e-forn" placeholder="Ex: Fornecedor ABC"></div>
      <div><label>Observação</label><input id="e-obs" placeholder="Ex: Coleção verão 2025"></div>
    </div>
    <button class="btn btn-primary" onclick="addEntrada()">Registrar entrada</button>
  </div>
</div>

<!-- SAÍDA -->
<div id="sec-saida" class="section">
  <div class="raised">
    <p class="section-title">Registrar saída (venda / baixa)</p>
    <div class="form-row">
      <div><label>Produto</label><select id="s-prod" style="width:100%"></select></div>
      <div><label>Quantidade</label><input id="s-qty" type="number" min="1" value="1"></div>
    </div>
    <div class="form-row">
      <div><label>Tipo de saída</label>
        <select id="s-tipo"><option>Venda</option><option>Troca</option><option>Descarte</option><option>Devolução</option></select>
      </div>
      <div><label>Observação (opcional)</label><input id="s-obs" placeholder="Ex: cliente, nota..."></div>
    </div>
    <button class="btn btn-primary" onclick="addSaida()">Registrar saída</button>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="sec-historico" class="section">
  <div class="raised">
    <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <select id="filtro-tipo" onchange="renderHistorico()" style="width:auto;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px">
        <option value="">Todos os tipos</option>
        <option value="Entrada">Entradas</option>
        <option value="Saída">Saídas</option>
      </select>
      <input id="filtro-busca" placeholder="🔍 Buscar produto..." oninput="renderHistorico()" style="flex:1;min-width:160px;padding:9px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;outline:none">
      <button class="btn" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    </div>
    <div id="tabela-historico"></div>
  </div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('loja_produtos')||'[]');
let movimentos = JSON.parse(localStorage.getItem('loja_movimentos')||'[]');

function save(){
  localStorage.setItem('loja_produtos',JSON.stringify(produtos));
  localStorage.setItem('loja_movimentos',JSON.stringify(movimentos));
}

function flash(msg,type){
  const el=document.getElementById('flash');
  el.className='flash '+(type==='err'?'flash-err':'flash-ok');
  el.style.display='block';
  el.textContent=msg;
  setTimeout(function(){el.style.display='none'},2800);
}

function showTab(t){
  var tabs=['dashboard','estoque','entrada','saida','historico'];
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('active',tabs[i]===t)});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.getElementById('sec-'+t).classList.add('active');
  if(t==='dashboard')renderDashboard();
  if(t==='estoque')renderEstoque();
  if(t==='entrada')renderSelectProd('e-prod');
  if(t==='saida')renderSelectProd('s-prod');
  if(t==='historico')renderHistorico();
}

function renderSelectProd(id){
  var s=document.getElementById(id);
  s.innerHTML=produtos.length
    ?produtos.map(function(p,i){return'<option value="'+i+'">'+p.nome+' — '+p.tamanho+(p.desc?' ('+p.desc+')':'')+' | Estoque: '+p.qty+'</option>'}).join('')
    :'<option>Nenhum produto cadastrado</option>';
}

function stockBadge(qty){
  if(qty<=0)return '<span class="badge badge-out">Esgotado</span>';
  if(qty<=5)return '<span class="badge badge-low">Estoque baixo</span>';
  return '<span class="badge badge-ok">OK</span>';
}

function renderDashboard(){
  var total=produtos.length;
  var totalQty=produtos.reduce(function(a,p){return a+p.qty},0);
  var totalCusto=produtos.reduce(function(a,p){return a+p.qty*p.custo},0);
  var totalVenda=produtos.reduce(function(a,p){return a+p.qty*p.venda},0);
  var totalVendas=movimentos.filter(function(m){return m.tipo==='Saída'&&m.subtipo==='Venda'}).reduce(function(a,m){return a+m.qty},0);

  document.getElementById('cards-dashboard').innerHTML=
    '<div class="card"><div class="label">Produtos cadastrados</div><div class="value">'+total+'</div></div>'+
    '<div class="card"><div class="label">Peças em estoque</div><div class="value">'+totalQty+'</div></div>'+
    '<div class="card"><div class="label">Valor de custo</div><div class="value">R$ '+totalCusto.toFixed(2)+'</div></div>'+
    '<div class="card"><div class="label">Valor de venda</div><div class="value">R$ '+totalVenda.toFixed(2)+'</div></div>'+
    '<div class="card"><div class="label">Total vendido (peças)</div><div class="value">'+totalVendas+'</div></div>';

  var low=produtos.filter(function(p){return p.qty<=5});
  document.getElementById('low-stock').innerHTML=low.length
    ?'<table><thead><tr><th>Produto</th><th>Categoria</th><th>Tamanho</th><th>Qtd</th><th>Status</th></tr></thead><tbody>'+
      low.map(function(p){return'<tr><td>'+p.nome+'</td><td>'+p.categoria+'</td><td>'+p.tamanho+'</td><td>'+p.qty+'</td><td>'+stockBadge(p.qty)+'</td></tr>'}).join('')+
      '</tbody></table>'
    :'<p class="empty">✅ Tudo com estoque suficiente!</p>';

  var rec=movimentos.slice(-8).reverse();
  document.getElementById('recent-moves').innerHTML=rec.length
    ?'<table><thead><tr><th>Data/Hora</th><th>Tipo</th><th>Produto</th><th>Qtd</th></tr></thead><tbody>'+
      rec.map(function(m){return'<tr><td>'+m.data+'</td><td><span class="badge '+(m.tipo==='Entrada'?'badge-in':'badge-low')+'">'+m.tipo+(m.subtipo?' / '+m.subtipo:'')+'</span></td><td>'+m.produto+'</td><td>'+m.qty+'</td></tr>'}).join('')+
      '</tbody></table>'
    :'<p class="empty">Nenhuma movimentação ainda.</p>';
}

function renderEstoque(){
  var q=(document.getElementById('search-estoque').value||'').toLowerCase();
  var list=produtos.filter(function(p){return p.nome.toLowerCase().indexOf(q)>=0||p.categoria.toLowerCase().indexOf(q)>=0||(p.desc||'').toLowerCase().indexOf(q)>=0});
  document.getElementById('tabela-estoque').innerHTML=list.length
    ?'<table><thead><tr><th>Nome</th><th>Categoria</th><th>Tam.</th><th>Cor/Desc.</th><th>Qtd</th><th>Custo</th><th>Venda</th><th>Margem</th><th>Status</th><th></th></tr></thead><tbody>'+
      list.map(function(p){
        var ri=produtos.indexOf(p);
        var margem=p.custo>0?((p.venda-p.custo)/p.custo*100).toFixed(0)+'%':'—';
        return'<tr><td><strong>'+p.nome+'</strong></td><td>'+p.categoria+'</td><td>'+p.tamanho+'</td><td style="color:#888">'+(p.desc||'—')+'</td><td><strong>'+p.qty+'</strong></td><td>R$ '+p.custo.toFixed(2)+'</td><td>R$ '+p.venda.toFixed(2)+'</td><td>'+margem+'</td><td>'+stockBadge(p.qty)+'</td><td><button class="btn btn-danger" onclick="deleteProduto('+ri+')">Remover</button></td></tr>';
      }).join('')+
      '</tbody></table>'
    :'<p class="empty">Nenhum produto encontrado.</p>';
}

function addProduto(){
  var nome=document.getElementById('p-nome').value.trim();
  if(!nome){flash('Informe o nome do produto.','err');return;}
  produtos.push({
    nome:nome,
    categoria:document.getElementById('p-cat').value,
    tamanho:document.getElementById('p-tam').value,
    qty:parseInt(document.getElementById('p-qty').value)||0,
    custo:parseFloat(document.getElementById('p-custo').value)||0,
    venda:parseFloat(document.getElementById('p-venda').value)||0,
    desc:document.getElementById('p-desc').value.trim()
  });
  save();
  document.getElementById('p-nome').value='';
  document.getElementById('p-qty').value=0;
  document.getElementById('p-custo').value='';
  document.getElementById('p-venda').value='';
  document.getElementById('p-desc').value='';
  flash('Produto cadastrado com sucesso!');
  renderEstoque();
}

function deleteProduto(i){
  if(!confirm('Tem certeza que deseja remover "'+produtos[i].nome+'"?'))return;
  produtos.splice(i,1);
  save();
  renderEstoque();
  flash('Produto removido.');
}

function now(){
  return new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function addEntrada(){
  var sel=document.getElementById('e-prod');
  if(!produtos.length){flash('Cadastre produtos primeiro.','err');return;}
  var i=parseInt(sel.value);
  var qty=parseInt(document.getElementById('e-qty').value)||0;
  if(qty<=0){flash('Quantidade inválida.','err');return;}
  produtos[i].qty+=qty;
  movimentos.push({data:now(),tipo:'Entrada',produto:produtos[i].nome,qty:qty,obs:document.getElementById('e-obs').value,forn:document.getElementById('e-forn').value});
  save();
  flash('Entrada de '+qty+' peça(s) de "'+produtos[i].nome+'" registrada!');
  document.getElementById('e-qty').value=1;
  document.getElementById('e-obs').value='';
  document.getElementById('e-forn').value='';
  renderSelectProd('e-prod');
}

function addSaida(){
  var sel=document.getElementById('s-prod');
  if(!produtos.length){flash('Cadastre produtos primeiro.','err');return;}
  var i=parseInt(sel.value);
  var qty=parseInt(document.getElementById('s-qty').value)||0;
  if(qty<=0){flash('Quantidade inválida.','err');return;}
  if(produtos[i].qty<qty){flash('Estoque insuficiente! Disponível: '+produtos[i].qty+' peça(s).','err');return;}
  produtos[i].qty-=qty;
  var subtipo=document.getElementById('s-tipo').value;
  movimentos.push({data:now(),tipo:'Saída',subtipo:subtipo,produto:produtos[i].nome,qty:qty,obs:document.getElementById('s-obs').value});
  save();
  flash('Saída de '+qty+' peça(s) de "'+produtos[i].nome+'" registrada!');
  document.getElementById('s-qty').value=1;
  document.getElementById('s-obs').value='';
  renderSelectProd('s-prod');
}

function renderHistorico(){
  var tf=document.getElementById('filtro-tipo').value;
  var tb=(document.getElementById('filtro-busca').value||'').toLowerCase();
  var list=movimentos.filter(function(m){return(tf===''||m.tipo===tf)&&(tb===''||m.produto.toLowerCase().indexOf(tb)>=0)}).slice().reverse();
  document.getElementById('tabela-historico').innerHTML=list.length
    ?'<table><thead><tr><th>Data/Hora</th><th>Tipo</th><th>Produto</th><th>Qtd</th><th>Obs / Fornecedor</th></tr></thead><tbody>'+
      list.map(function(m){return'<tr><td style="color:#888;white-space:nowrap">'+m.data+'</td><td><span class="badge '+(m.tipo==='Entrada'?'badge-in':'badge-low')+'">'+m.tipo+(m.subtipo?' / '+m.subtipo:'')+'</span></td><td>'+m.produto+'</td><td><strong>'+m.qty+'</strong></td><td style="color:#888">'+(m.obs||(m.forn?'Forn: '+m.forn:'')||'—')+'</td></tr>'}).join('')+
      '</tbody></table>'
    :'<p class="empty">Nenhuma movimentação encontrada.</p>';
}

function exportarCSV(){
  if(!movimentos.length){flash('Sem dados para exportar.','err');return;}
  var header='Data/Hora,Tipo,Subtipo,Produto,Quantidade,Observação,Fornecedor';
  var rows=movimentos.map(function(m){
    return [m.data,m.tipo,m.subtipo||'',m.produto,m.qty,m.obs||'',m.forn||''].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"'}).join(',');
  });
  var csv='\uFEFF'+header+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='historico_loja.csv';a.click();
  URL.revokeObjectURL(url);
  flash('CSV exportado com sucesso!');
}

setInterval(function(){
  var el=document.getElementById('data-hora');
  if(el)el.textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'})+' • '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
},1000);

renderDashboard();
</script>
</body>
</html>
